<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="An interactive, voice-powered frog jump game controlled by voice frequency. Hum to jump and master the lily pads!">
    <meta name="keywords" content="Voice Game, Frog Jump, Arduino, Frequency Detection, Web Audio API">
    <meta property="og:title" content="Froggy Frequency: Voice-Powered Jump">
    <meta property="og:description" content="Pitch-perfect platforming. Control your frog with your voice!">
    <title>Froggy Frequency | Voice-Powered Frog Jump</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <div id="game-container">
        <header>
            <h1>Froggy Frequency</h1>
            <div id="controls">
                <button id="connect-btn" class="premium-btn">Connect Arduino</button>
                <div id="status">
                    <span class="status-dot"></span>
                    <span id="status-text">Disconnected</span>
                </div>
                <select id="age-select" class="premium-select">
                    <option value="toddler">Toddler (Higher Pitch)</option>
                    <option value="child" selected>Child (Standard)</option>
                    <option value="adult">Adult (Lower Pitch)</option>
                </select>
                <select id="category-select" class="premium-select">
                    <option value="Vowels">Train Vowels</option>
                    <option value="Words">Train Words</option>
                </select>
                <div class="toggle-container">
                    <label class="switch">
                        <input type="checkbox" id="practice-mode">
                        <span class="slider"></span>
                    </label>
                    <span class="label-text">Practice Mode</span>
                </div>
            </div>
            <div class="stats">
                <div class="stat-item">Score: <span id="score">0</span></div>
                <div class="stat-item">Freq: <span id="freq-val">0</span>Hz</div>
            </div>
        </header>

        <div id="visualizer-container">
            <canvas id="visualizerCanvas"></canvas>
            <div id="calibration-info">Calibrating...</div>
        </div>

        <div id="prompt-container">
            <div id="prompt-label">SPEECH TASK</div>
            <div id="prompt-text">Make a sound to start!</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div id="instruction-overlay">
            <div class="overlay-content">
                <h2 id="overlay-title">Ready to Jump?</h2>
                <div id="session-summary" style="display:none;">
                    <h3>Session Results</h3>
                    <div id="mastery-list"></div>
                </div>
                <p id="overlay-msg">1. Connect your Arduino via Serial.</p>
                <p>2. Hum or Sing to make the frog jump!</p>
                <p>3. High pitch = Far jump, Low pitch = High jump.</p>
                <div class="btn-group">
                    <button id="start-btn" class="premium-btn">Start Game</button>
                </div>
            </div>
        </div>
    </div>
    <div id="diagnostic-log"
        style="position:fixed; bottom:10px; right:10px; width:250px; height:150px; background:rgba(0,0.4); font-family:monospace; font-size:10px; color:#44ff44; padding:10px; border-radius:8px; overflow-y:auto; z-index:1000; border:1px solid #44ff44; display:none;">
        <div>-- System Logs --</div>
    </div>
    <script src="game.js"></script>
</body>

</html>
